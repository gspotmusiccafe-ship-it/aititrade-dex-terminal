steps:
  - name: 'node:20'
    entrypoint: 'npm'
    args: ['install']
    
  - name: 'node:20'
    entrypoint: 'npm'
    args: ['run', 'build']
    # THIS PULLS THE VARIABLES YOU ADDED TO THE TRIGGER INTO THE CODE
    env:
      - 'DATABASE_URL=$_DATABASE_URL'

  # THE OFFICIAL FIREBASE DEPLOY PATH
  - name: 'us-docker.pkg.dev/firebase-cli/us/firebase'
    args: ['deploy', '--project', 'aititrade-exchange-pro', '--only', 'hosting']
