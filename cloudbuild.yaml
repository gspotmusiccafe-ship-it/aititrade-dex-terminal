steps:
  - name: 'node:20'
    entrypoint: 'npm'
    args: ['install']
  - name: 'node:20'
    entrypoint: 'npm'
    args: ['run', 'build']
  - name: 'gcr.io/cloud-builders/firebase'
 args: ['deploy', '--project', 'aititrade-exchange-pro', '--only', 'hosting', '--config', 'server/firebase.json']

options:
  logging: CLOUD_LOGGING_ONLY
