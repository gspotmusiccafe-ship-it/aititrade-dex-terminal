steps:
  - name: 'node:20'
    entrypoint: 'npm'
    args: ['install']
    
  - name: 'node:20'
    entrypoint: 'npm'
    args: ['run', 'build']
    # THIS IS THE MISSING BRIDGE
    env:
      - 'DATABASE_URL=$_DATABASE_URL'

  # THE OFFICIAL 2026 FIREBASE DEPLOY
  - name: 'us-docker.pkg.dev/firebase-cli/us/firebase'
    args: ['deploy', '--project', 'aititrade-exchange-pro', '--only', 'hosting']
options:
  logging: CLOUD_LOGGING_ONLY
