<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AITITRADE — LIVE MARKET TERMINAL</title>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0b0f14;
      color: #d1d4dc;
      font-family: 'Inter', Arial, sans-serif;
      overflow: hidden;
      height: 100vh;
    }

    .topbar {
      height: 50px;
      display: flex;
      align-items: center;
      padding: 0 16px;
      background: #111827;
      border-bottom: 1px solid #1f2937;
      gap: 16px;
    }
    .topbar-brand {
      font-weight: 900;
      font-size: 14px;
      letter-spacing: 3px;
      color: #00ff99;
      text-transform: uppercase;
    }
    .topbar-divider {
      width: 1px;
      height: 24px;
      background: #1f2937;
    }
    .topbar-price {
      font-size: 22px;
      font-weight: 700;
      color: #00ff99;
      font-family: 'Courier New', monospace;
      transition: color 0.3s;
    }
    .topbar-price.down { color: #ff4d4d; }
    .topbar-stats {
      display: flex;
      gap: 20px;
      margin-left: auto;
      font-size: 11px;
    }
    .topbar-stat {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
    }
    .topbar-stat-label {
      color: #6b7280;
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .topbar-stat-value {
      color: #d1d4dc;
      font-weight: 600;
      font-family: 'Courier New', monospace;
    }
    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #374151;
      display: inline-block;
      margin-right: 4px;
    }
    .status-dot.live {
      background: #00ff99;
      box-shadow: 0 0 6px #00ff99;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

    .main-grid {
      display: grid;
      grid-template-columns: 1fr 280px;
      height: calc(100vh - 50px);
    }
    @media (max-width: 768px) {
      .main-grid { grid-template-columns: 1fr; }
      .sidebar { display: none; }
    }

    .chart-area {
      display: flex;
      flex-direction: column;
      min-width: 0;
    }
    #chart {
      flex: 1;
      min-height: 0;
    }

    .bottom-bar {
      height: 40px;
      background: #111827;
      border-top: 1px solid #1f2937;
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 20px;
      font-size: 10px;
      color: #6b7280;
      letter-spacing: 0.5px;
      font-family: 'Courier New', monospace;
      overflow: hidden;
      white-space: nowrap;
    }
    .bottom-bar .ticker-item { color: #00ff99; }

    .sidebar {
      border-left: 1px solid #1f2937;
      background: #0f1318;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .panel {
      padding: 12px;
      border-bottom: 1px solid #1f2937;
    }
    .panel-title {
      font-size: 10px;
      letter-spacing: 2px;
      color: #6b7280;
      text-transform: uppercase;
      margin-bottom: 10px;
      font-weight: 600;
    }

    .book-container {
      display: flex;
      gap: 8px;
    }
    .book-side {
      flex: 1;
    }
    .book-header {
      font-size: 10px;
      font-weight: 700;
      margin-bottom: 6px;
      letter-spacing: 1px;
    }
    .book-header.bid { color: #00ff99; }
    .book-header.ask { color: #ff4d4d; }

    .book-row {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      font-family: 'Courier New', monospace;
      padding: 2px 0;
      position: relative;
    }
    .book-row .book-bg {
      position: absolute;
      top: 0; bottom: 0;
      right: 0;
      opacity: 0.08;
    }
    .book-row.bid .book-bg { background: #00ff99; }
    .book-row.ask .book-bg { background: #ff4d4d; }
    .book-row .book-price { z-index: 1; }
    .book-row .book-size { z-index: 1; color: #9ca3af; }
    .book-row.bid .book-price { color: #00ff99; }
    .book-row.ask .book-price { color: #ff4d4d; }

    .spread-row {
      text-align: center;
      font-size: 10px;
      color: #6b7280;
      padding: 6px 0;
      border-top: 1px solid #1f2937;
      border-bottom: 1px solid #1f2937;
      font-family: 'Courier New', monospace;
    }

    .trades-list {
      flex: 1;
      overflow-y: auto;
      padding: 0 12px 12px;
    }
    .trade-row {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      font-family: 'Courier New', monospace;
      padding: 3px 0;
      border-bottom: 1px solid #0d1117;
    }
    .trade-row .trade-price { font-weight: 600; }
    .trade-row.buy .trade-price { color: #00ff99; }
    .trade-row.sell .trade-price { color: #ff4d4d; }
    .trade-row .trade-time { color: #6b7280; font-size: 10px; }

    .metrics-panel {
      padding: 12px;
    }
    .metric-row {
      display: flex;
      justify-content: space-between;
      padding: 4px 0;
      font-size: 11px;
    }
    .metric-label { color: #6b7280; }
    .metric-value {
      color: #d1d4dc;
      font-weight: 600;
      font-family: 'Courier New', monospace;
    }
    .metric-value.green { color: #00ff99; }
    .metric-value.red { color: #ff4d4d; }
    .metric-value.yellow { color: #f59e0b; }

    .fill-bar {
      height: 4px;
      background: #1f2937;
      border-radius: 2px;
      margin: 8px 0;
      overflow: hidden;
    }
    .fill-bar-inner {
      height: 100%;
      background: #00ff99;
      border-radius: 2px;
      transition: width 0.5s ease;
    }

    .split-visual {
      display: flex;
      height: 20px;
      border-radius: 4px;
      overflow: hidden;
      margin: 6px 0;
    }
    .split-floor-bar {
      background: #00ff99;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      color: #000;
      font-weight: 700;
      transition: width 0.5s;
    }
    .split-house-bar {
      background: #1f2937;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      color: #9ca3af;
      font-weight: 700;
      transition: width 0.5s;
    }

    .btn-group {
      display: flex;
      gap: 6px;
      padding: 12px;
      border-top: 1px solid #1f2937;
    }
    .btn {
      flex: 1;
      padding: 8px;
      border: none;
      border-radius: 4px;
      font-family: 'Inter', Arial, sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      cursor: pointer;
      text-transform: uppercase;
      transition: all 0.15s;
    }
    .btn-buy {
      background: #00ff99;
      color: #000;
    }
    .btn-buy:hover { background: #33ffad; }
    .btn-buy:active { transform: scale(0.97); }
    .btn-impulse {
      background: #f59e0b;
      color: #000;
    }
    .btn-impulse:hover { background: #fbbf24; }
    .btn-impulse:active { transform: scale(0.97); }

    .halt-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(255,0,0,0.08);
      z-index: 200;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
    }
    .halt-overlay.active { display: flex; }
    .halt-box {
      background: #1a0000;
      border: 2px solid #ff4d4d;
      border-radius: 8px;
      padding: 40px 60px;
      text-align: center;
      animation: haltPulse 2s infinite;
    }
    .halt-box h2 {
      color: #ff4d4d;
      font-size: 28px;
      letter-spacing: 6px;
      font-weight: 900;
    }
    .halt-box p {
      color: #ff6666;
      font-size: 12px;
      margin-top: 8px;
      opacity: 0.8;
    }
    @keyframes haltPulse { 0%,100% { border-color: #ff4d4d; } 50% { border-color: #660000; } }
  </style>
</head>
<body>

  <div class="topbar">
    <div class="topbar-brand">AITITRADE</div>
    <div class="topbar-divider"></div>
    <div class="topbar-price" id="topPrice" data-testid="text-live-price">1.0000</div>
    <div class="topbar-stats">
      <div class="topbar-stat">
        <span class="topbar-stat-label">Volume</span>
        <span class="topbar-stat-value" id="topVolume">$0.00</span>
      </div>
      <div class="topbar-stat">
        <span class="topbar-stat-label">Cycle</span>
        <span class="topbar-stat-value" id="topCycle">1</span>
      </div>
      <div class="topbar-stat">
        <span class="topbar-stat-label">Fill</span>
        <span class="topbar-stat-value" id="topFill">0%</span>
      </div>
      <div class="topbar-stat">
        <span class="status-dot" id="statusDot"></span>
        <span class="topbar-stat-value" id="statusText" style="font-size:10px;">CONNECTING</span>
      </div>
    </div>
  </div>

  <div class="main-grid">
    <div class="chart-area">
      <div id="chart" data-testid="chart-candles"></div>
      <div class="bottom-bar" id="tickerTape">
        AITITRADE LIVE MARKET TERMINAL — AWAITING DATA...
      </div>
    </div>

    <div class="sidebar">
      <div class="panel">
        <div class="panel-title">Order Book</div>
        <div class="book-container">
          <div class="book-side">
            <div class="book-header bid">BIDS</div>
            <div id="bids"></div>
          </div>
          <div class="book-side">
            <div class="book-header ask">ASKS</div>
            <div id="asks"></div>
          </div>
        </div>
        <div class="spread-row" id="spreadRow">SPREAD: —</div>
      </div>

      <div class="panel">
        <div class="panel-title">Last Trades</div>
      </div>
      <div class="trades-list" id="trades" data-testid="list-trades"></div>

      <div class="panel metrics-panel">
        <div class="panel-title">Engine</div>
        <div class="metric-row"><span class="metric-label">Demand</span><span class="metric-value" id="mDemand">0</span></div>
        <div class="metric-row"><span class="metric-label">Supply</span><span class="metric-value" id="mSupply">0</span></div>
        <div class="metric-row"><span class="metric-label">Queue</span><span class="metric-value" id="mQueue">0</span></div>
        <div class="metric-row"><span class="metric-label">Safe Stop</span><span class="metric-value green" id="mSafe">OK</span></div>

        <div class="panel-title" style="margin-top: 10px;">Volume Fill</div>
        <div class="fill-bar">
          <div class="fill-bar-inner" id="fillBar" style="width: 0%"></div>
        </div>

        <div class="panel-title">Floor / House</div>
        <div class="split-visual">
          <div class="split-floor-bar" id="splitFloor" style="width: 50%;">50%</div>
          <div class="split-house-bar" id="splitHouse" style="width: 50%;">50%</div>
        </div>
      </div>

      <div class="btn-group">
        <button class="btn btn-buy" onclick="doBuy()" data-testid="button-buy">BUY $1</button>
        <button class="btn btn-impulse" onclick="doImpulse()" data-testid="button-impulse">IMPULSE</button>
      </div>
    </div>
  </div>

  <div class="halt-overlay" id="haltOverlay">
    <div class="halt-box">
      <h2>MARKET HALTED</h2>
      <p>SAFE STOP TRIGGERED — PRICE BELOW THRESHOLD</p>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
