steps:
  - name: 'node:20'
    entrypoint: 'npm'
    args: ['install']
  - name: 'node:20'
    entrypoint: 'npm'
    args: ['run', 'build']
  - name: 'gcr.io/cloud-builders/firebase:3.12.0'
    # We tell it to look at the JSON right next to it in the server folder
    args: ['deploy', '--project', 'aititrade-exchange-pro', '--only', 'hosting', '--config', 'firebase.json']

options:
  logging: CLOUD_LOGGING_ONLY
