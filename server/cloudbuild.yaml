steps:
  - name: 'node:20'
    entrypoint: 'npm'
    args: ['install']
  - name: 'node:20'
    entrypoint: 'npm'
    args: ['run', 'build']
  # Pinned the version to avoid the "manifest unknown" error
  - name: 'gcr.io/cloud-builders/firebase:3.12.0'
    args: ['deploy', '--project', 'aititrade-exchange-pro', '--only', 'hosting']

options:
  logging: CLOUD_LOGGING_ONLY
